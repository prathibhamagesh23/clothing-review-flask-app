<!DOCTYPE html>
<html>
<head>
    <title>Clothing Reviews</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<style>
.container {
    max-width: 960px;
    margin: 0 auto;
    padding: 20px;
}
</style>

<body>
    <!-- Navigation Bar -->
    <nav style="background-color: #2c3e50; padding: 12px; text-align: center;">
        <a href="{{ url_for('index') }}" style="color: white; margin: 0 15px; text-decoration: none; font-weight: bold;">Home</a>
        <a href="{{ url_for('index') }}" style="color: white; margin: 0 15px; text-decoration: none;">Browse</a>
        <a href="{{ url_for('about') }}" style="color: white; margin: 0 15px; text-decoration: none;">About</a>
    </nav>

    <!-- Title -->
    <div class="container">
        <h1 style="font-size: 2.5rem; margin-bottom: 10px;">
            🛍️ <a href="{{ url_for('index') }}" style="text-decoration: none;">
                <span style="color: #007bff;"> The Souled Store</span>
            </a>
        </h1>
        <hr style="margin-top: 10px;">

        <!-- Toast Message (auto-fade success) -->
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div id="toast" class="toast">
              {% for message in messages %}
                ✅ {{ message }}
              {% endfor %}
            </div>
          {% endif %}
        {% endwith %}

        <!-- Page Content -->
        {% block content %}{% endblock %}
    </div>
</body>

</html>
