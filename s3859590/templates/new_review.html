{% extends "base.html" %}

{% block content %}
<h2>Write a Review for: {{ item['Clothes Title'] }}</h2>

<form method="post">
    <label for="title">Review Title:</label><br>
    <input type="text" name="title" required><br><br>

    <label for="review">Review Text:</label><br>
    <textarea name="review" rows="4" cols="50" required></textarea><br><br>

    <label for="rating">Rating (1 to 5):</label><br>
    <input type="number" name="rating" min="1" max="5" required><br><br>

    <button type="submit">Submit Review</button>
</form>

<br>
<a href="{{ url_for('item_detail', item_id=item['Clothing ID']) }}">← Back to Item</a>
{% endblock %}
